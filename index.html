<html lang="ko">
  <head>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-9E4PEJJ0ZT"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);

      gtag("js", new Date());
      gtag("config", "G-9E4PEJJ0ZT");

    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./variables.css" />
    <link rel="stylesheet" href="./index.css" />
    <link rel="icon" type="image/x-icon" href="./assets/img/logo-sm.png" />

    <!-- 테스트 할 api -->
    <script type="module" src="./apis/articleService.js" defer></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓</title>
  </head>
  <body>
    <header>
      <a href="./" class="logo">
        <img src="./assets/img/logo-sm.png" alt="로고" class="logo-img" />
        <h1>판다마켓</h1>
      </a>
      <a href="./screens/auth/login/login.html" class="login-btn">
        <p>로그인</p>
      </a>
    </header>
    <main>
      <section class="banner">
        <div class="banner-wrapper">
          <div class="banner-content">
            <h2>
              일상의 모든 물건을<br />
              거래해 보세요
            </h2>
            <a href="./screens/shop/item/items.html" class="look-btn">
              <p>구경하러 가기</p>
            </a>
          </div>
          <img
            src="./assets/img/banner-top.png"
            alt="banner image"
            class="banner-img"
            id="test"
          />
        </div>
      </section>
      <div class="content">
        <div class="card-container">
          <div class="card">
            <img
              src="./assets/img/card1.png"
              alt="card iamge for hot item"
              class="card-img"
            />
            <div class="card-content">
              <div>
                <p class="card-tag">Hot Item</p>
                <h3 class="card-title">인기 상품을<br />확인해 보세요</h3>
                <p class="card-text">
                  가장 HOT한 중고거래 물품을<br />판다 마켓에서 확인해 보세요
                </p>
              </div>
            </div>
          </div>
        </div>
        <div class="card-container">
          <div class="card flip">
            <img
              src="./assets/img/card2.png"
              alt="card iamge for search"
              class="card-img"
            />
            <div class="flipped-card-content">
              <div class="flipped-card-div">
                <p class="card-tag">Search</p>
                <h3 class="card-title">구매를 원하는<br />상품을 검색하세요</h3>
                <p class="card-text">
                  구매하고 싶은 물품은 검색해서<br />쉽게 찾아보세요
                </p>
              </div>
            </div>
          </div>
        </div>
        <div class="card-container">
          <div class="card">
            <img
              src="./assets/img/card3.png"
              alt="card iamge for register"
              class="card-img"
            />
            <div class="card-content">
              <div>
                <p class="card-tag">Register</p>
                <h3 class="card-title">판매를 원하는<br />상품을 등록하세요</h3>
                <p class="card-text">
                  어떤 물건이든 판매하고 싶은<br />
                  상품을 쉽게 등록하세요
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="banner">
        <div class="banner-wrapper">
          <div class="banner-content">
            <h2>
              믿을 수 있는<br />
              판다마켓 중고 거래
            </h2>
          </div>
          <img
            src="./assets/img/banner-bottom.png"
            alt="banner image"
            class="banner-img"
          />
        </div>
      </div>
    </main>
    <footer>
      <div class="footer-content">
        <p class="company">@codeit-2024</p>
        <div class="info">
          <a href="./screens/info/policy/policy.html">
            <p>Privacy Policy</p>
          </a>
          <a href="./screens/info/faq/faq.html">
            <p>FAQ</p>
          </a>
        </div>
        <div class="sns">
          <a href="https://www.facebook.com/" target="_blank">
            <img src="./assets/icons/ic_facebook.png" alt="facebook" />
          </a>
          <a href="https://x.com/" target="_blank">
            <img src="./assets/icons/ic_twitter.png" alt="twitter" />
          </a>
          <a href="https://www.youtube.com/" target="_blank">
            <img src="./assets/icons/ic_youtube.png" alt="youtube" />
          </a>
          <a href="https://www.instagram.com/?hl=en" target="_blank">
            <img src="./assets/icons/ic_instagram.png" alt="instagram" />
          </a>
        </div>
      </div>
    </footer>
