<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./login.css" />
    <link rel="stylesheet" href="./reset.css" />
    <script type="text/javascript" src="./login.js" defer></script>
    <title>Document</title>
  </head>
  <body>
    <div class="body">
      <a href="./index.html">
        <div class="logo">
          <img
            class="logo-img"
            src="./assets/img/logo-lg.png"
            alt="panda-logo"
          />
          <h1 class="logo-txt">판다마켓</h1>
        </div>
      </a>
      <div class="content">
        <div class="input">
          <p class="input-txt">이메일</p>
          <div class="input-bar">
            <input type="email" placeholder="이메일을 입력해주세요" />
          </div>
        </div>
        <div class="input">
          <p class="input-txt">비밀번호</p>
          <div class="input-bar">
            <input type="password" placeholder="비밀번호를 입력해주세요" />
            <img
              src="./assets/icons/ic_btn_visibility_off.png"
              alt="toggle-pw-visibility"
              class="input-toggle"
            />
          </div>
        </div>
        <div class="btn">
          <p class="btn-txt">로그인</p>
        </div>
        <div class="social-login">
          <p class="social-txt">간편 로그인하기</p>
          <div class="social-btns">
            <a href="https://www.google.com/">
              <img
                src="./assets/icons/ic_google.png"
                alt="google-login"
                class="social-btn"
              />
            </a>
            <a href="https://www.kakaocorp.com/page/">
              <img
                src="./assets/icons/ic_kakao.png"
                alt="kakao-login"
                class="social-btn"
              />
            </a>
          </div>
        </div>
        <div class="signup">
          <p>판다마켓이 처음이신가요?</p>
          <a class="signup-link" href="./signup.html">회원가입</a>
        </div>
      </div>
    </div>
  </body>
</html>
