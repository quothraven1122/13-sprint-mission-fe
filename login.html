<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./login.css" />
    <link rel="stylesheet" href="./reset.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="body">
      <div class="logo">
        <img class="logo-img" src="./assets/img/logo-lg.png" alt="panda-logo" />
        <h1 class="logo-txt">판다마켓</h1>
      </div>
      <div class="content">
        <div class="input">
          <p class="input-txt">이메일</p>
          <div class="input-bar">
            <input type="email" />
          </div>
        </div>
        <div class="input">
          <p class="input-txt">비밀번호</p>
          <div class="input-bar">
            <input type="password" />
            <img
              src="./assets/icons/ic_btn_visibility_off.png"
              alt="toggle-pw-visibility"
            />
          </div>
        </div>
        <div class="btn">
          <p class="btn-txt">로그인</p>
        </div>
        <div class="social-login">
          <p class="social-txt">간편 로그인하기</p>
          <div class="social-btns">
            <img
              src="./assets/icons/ic_google.png"
              alt="google-login"
              class="social-btn"
            />
            <img
              src="./assets/icons/ic_kakao.png"
              alt="kakao-login"
              class="social-btn"
            />
          </div>
        </div>
        <div class="signup">
          <p>판다마켓이 처음이신가요?</p>
          <a>회원가입</a>
        </div>
      </div>
    </div>
  </body>
</html>
